<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="gold-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c9a84c" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="white-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fafafa" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fafafa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fafafa" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Organic flowing curves (carbon/human) -->
  <path d="M0 140 C80 120, 160 60, 280 80 C400 100, 480 160, 560 100 C640 40, 720 80, 800 60"
        stroke="url(#white-fade)" stroke-width="1.5" fill="none"/>
  <path d="M0 160 C100 130, 200 80, 340 100 C480 120, 540 170, 660 120 C740 90, 780 100, 800 80"
        stroke="url(#white-fade)" stroke-width="1" fill="none"/>

  <!-- Geometric angular paths (silicon/AI) -->
  <path d="M0 100 L80 80 L180 110 L300 60 L420 90 L520 50 L640 80 L720 60 L800 70"
        stroke="url(#gold-fade)" stroke-width="1.5" fill="none"/>
  <path d="M0 120 L100 100 L220 130 L360 80 L460 110 L580 70 L700 100 L800 90"
        stroke="url(#gold-fade)" stroke-width="1" fill="none"/>

  <!-- Intersection sparks -->
  <circle cx="280" cy="80" r="2" fill="#c9a84c" opacity="0.4"/>
  <circle cx="520" cy="75" r="2.5" fill="#c9a84c" opacity="0.35"/>
  <circle cx="660" cy="100" r="1.5" fill="#c9a84c" opacity="0.3"/>

  <!-- Subtle circuit nodes -->
  <rect x="178" y="108" width="4" height="4" rx="0.5" fill="#c9a84c" opacity="0.15"/>
  <rect x="418" y="88" width="4" height="4" rx="0.5" fill="#c9a84c" opacity="0.15"/>
  <rect x="638" y="78" width="4" height="4" rx="0.5" fill="#c9a84c" opacity="0.15"/>
</svg>
