<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Minimal human-AI fusion icon for nav: two half-profiles merged -->
  <!-- Left: organic curve (human) -->
  <path d="M20 5 C14 5, 8 10, 7 16 C6 22, 8 26, 10 30 L10 35 L20 35"
        stroke="#fafafa" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Right: angular line (AI) -->
  <path d="M20 5 L28 9 L31 16 L30 22 L32 30 L30 35 L20 35"
        stroke="#c9a84c" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
  <!-- Fusion spark -->
  <circle cx="20" cy="12" r="1.5" fill="#c9a84c" opacity="0.7"/>
  <!-- Human eye hint -->
  <circle cx="14" cy="18" r="1.2" fill="#fafafa" opacity="0.5"/>
  <!-- AI eye hint -->
  <rect x="24.5" y="16.5" width="2.5" height="2.5" rx="0.5" fill="#c9a84c" opacity="0.5" transform="rotate(45 25.75 17.75)"/>
</svg>
