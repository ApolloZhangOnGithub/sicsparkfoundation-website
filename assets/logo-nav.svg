<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Nav: simplified split figure -->

  <!-- Left: human outline with machine hint -->
  <path d="M20 5 C14 5, 8 10, 7 16 C6 22, 7 26, 9 30 L8 35 L20 35"
        stroke="#fafafa" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Human eye -->
  <circle cx="14" cy="17" r="1.2" fill="#fafafa" opacity="0.5"/>
  <!-- Circuit node hint -->
  <circle cx="9" cy="23" r="0.8" fill="#c9a84c" opacity="0.4"/>

  <!-- Right: machine outline with human hint -->
  <path d="M20 5 L27 8 L31 14 L32 20 L31 26 L32 30 L33 35 L20 35"
        stroke="#c9a84c" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
  <!-- Machine eye — diamond -->
  <path d="M25 16 L27 14 L29 16 L27 18 Z" stroke="#c9a84c" stroke-width="0.8" fill="none" opacity="0.5"/>
  <!-- Soft pupil -->
  <circle cx="27" cy="16" r="0.7" fill="#fafafa" opacity="0.35"/>

  <!-- Spark -->
  <circle cx="20" cy="10" r="1.3" fill="#c9a84c" opacity="0.6"/>
</svg>
