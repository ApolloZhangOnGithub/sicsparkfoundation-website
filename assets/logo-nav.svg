<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Nav version: simplified ring, organic left + geometric right -->

  <!-- Organic arc — smooth curve, left half -->
  <path d="M19.5 6
           C12 7.2, 6 13, 6 20
           C6 27.5, 12 33.5, 19.5 34.5"
        stroke="#fafafa" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Geometric arc — angular segments, right half -->
  <path d="M20.5 6
           L28 10
           L32.5 15
           L34 20
           L32.5 25.5
           L28 31
           L20.5 34.5"
        stroke="#c9a84c" stroke-width="1.8" fill="none" stroke-linejoin="round"/>

  <!-- Convergence spark -->
  <circle cx="20" cy="4.5" r="1.5" fill="#c9a84c" opacity="0.7"/>
</svg>
