<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" fill="none">
  <defs>
    <linearGradient id="line-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0"/>
      <stop offset="20%" stop-color="#c9a84c" stop-opacity="0.15"/>
      <stop offset="80%" stop-color="#c9a84c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Network connections -->
  <line x1="80" y1="60" x2="200" y2="40" stroke="url(#line-fade)" stroke-width="0.5"/>
  <line x1="200" y1="40" x2="340" y2="70" stroke="url(#line-fade)" stroke-width="0.5"/>
  <line x1="340" y1="70" x2="460" y2="35" stroke="url(#line-fade)" stroke-width="0.5"/>
  <line x1="460" y1="35" x2="580" y2="55" stroke="url(#line-fade)" stroke-width="0.5"/>
  <line x1="580" y1="55" x2="720" y2="45" stroke="url(#line-fade)" stroke-width="0.5"/>
  <line x1="200" y1="40" x2="460" y2="35" stroke="url(#line-fade)" stroke-width="0.3"/>
  <line x1="340" y1="70" x2="580" y2="55" stroke="url(#line-fade)" stroke-width="0.3"/>
  <line x1="80" y1="60" x2="340" y2="70" stroke="url(#line-fade)" stroke-width="0.3"/>
  <line x1="460" y1="35" x2="720" y2="45" stroke="url(#line-fade)" stroke-width="0.3"/>

  <!-- Nodes -->
  <circle cx="80" cy="60" r="2.5" fill="#c9a84c" opacity="0.3"/>
  <circle cx="200" cy="40" r="3" fill="#c9a84c" opacity="0.35"/>
  <circle cx="340" cy="70" r="2" fill="#c9a84c" opacity="0.25"/>
  <circle cx="460" cy="35" r="3.5" fill="#c9a84c" opacity="0.4"/>
  <circle cx="580" cy="55" r="2" fill="#c9a84c" opacity="0.3"/>
  <circle cx="720" cy="45" r="2.5" fill="#c9a84c" opacity="0.35"/>

  <!-- Outer rings on key nodes -->
  <circle cx="460" cy="35" r="8" stroke="#c9a84c" stroke-width="0.5" fill="none" opacity="0.15"/>
  <circle cx="200" cy="40" r="6" stroke="#c9a84c" stroke-width="0.5" fill="none" opacity="0.12"/>
</svg>
