<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Human-AI fusion: one continuous figure, left organic, right geometric -->

  <!-- Left half: organic human profile - flowing curves -->
  <path d="M100 28
           C82 28, 62 42, 56 64
           C50 86, 54 100, 60 116
           C64 126, 58 142, 56 156
           L56 172
           C56 178, 62 182, 70 182
           L100 182"
        stroke="#fafafa" stroke-width="2.8" fill="none" stroke-linecap="round"/>

  <!-- Right half: geometric AI profile - angular lines -->
  <path d="M100 28
           L132 42
           L144 64
           L140 100
           L148 116
           L144 142
           L144 172
           C144 178, 138 182, 130 182
           L100 182"
        stroke="#c9a84c" stroke-width="2.8" fill="none" stroke-linejoin="round"/>

  <!-- Human eye - soft organic -->
  <path d="M72 78 C76 72, 88 72, 92 78 C88 84, 76 84, 72 78 Z" stroke="#fafafa" stroke-width="1.5" fill="none" opacity="0.8"/>
  <circle cx="82" cy="78" r="2" fill="#fafafa" opacity="0.7"/>

  <!-- AI eye - precise geometric -->
  <path d="M118 78 L126 72 L134 78 L126 84 Z" stroke="#c9a84c" stroke-width="1.5" fill="none" opacity="0.8"/>
  <circle cx="126" cy="78" r="2" fill="#c9a84c" opacity="0.7"/>

  <!-- Fusion spark at forehead center -->
  <path d="M100 48 L102 54 L108 56 L102 58 L100 64 L98 58 L92 56 L98 54 Z" fill="#c9a84c" opacity="0.6"/>

  <!-- Organic tendrils from human side -->
  <path d="M66 90 C58 86, 48 88, 42 82" stroke="#fafafa" stroke-width="1.2" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M64 96 C56 98, 46 96, 40 100" stroke="#fafafa" stroke-width="1.2" fill="none" opacity="0.25" stroke-linecap="round"/>
  <circle cx="42" cy="82" r="2.5" fill="#fafafa" opacity="0.2"/>
  <circle cx="40" cy="100" r="2" fill="#fafafa" opacity="0.15"/>

  <!-- Circuit nodes from AI side -->
  <line x1="144" y1="80" x2="160" y2="76" stroke="#c9a84c" stroke-width="1.2" opacity="0.3"/>
  <line x1="144" y1="90" x2="162" y2="92" stroke="#c9a84c" stroke-width="1.2" opacity="0.25"/>
  <rect x="158" y="73" width="5" height="5" rx="1" fill="#c9a84c" opacity="0.25"/>
  <rect x="160" y="89.5" width="5" height="5" rx="1" fill="#c9a84c" opacity="0.2"/>

  <!-- Inner circuit pattern on AI side -->
  <path d="M120 104 L136 104 L136 118" stroke="#c9a84c" stroke-width="0.8" opacity="0.2"/>
  <circle cx="136" cy="118" r="1.5" fill="#c9a84c" opacity="0.2"/>

  <!-- Inner organic vein on human side -->
  <path d="M80 104 C74 112, 68 120, 64 126" stroke="#fafafa" stroke-width="0.8" fill="none" opacity="0.15" stroke-linecap="round"/>

  <!-- Subtle center merge line -->
  <line x1="100" y1="40" x2="100" y2="170" stroke="#c9a84c" stroke-width="0.5" opacity="0.15" stroke-dasharray="3 5"/>
</svg>
