<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- SiC Spark: two arcs forming a near-complete ring -->
  <!-- Left: organic smooth curve (carbon/human) -->
  <!-- Right: angular geometric segments (silicon/AI) -->
  <!-- Spark at top convergence point -->

  <!-- Organic arc — smooth bezier curve, left half -->
  <path d="M98 32
           C62 38, 32 66, 32 100
           C32 136, 62 166, 98 172"
        stroke="#fafafa" stroke-width="2.8" fill="none" stroke-linecap="round"/>

  <!-- Geometric arc — angular segments, right half -->
  <path d="M102 32
           L136 48
           L158 74
           L166 100
           L158 128
           L136 156
           L102 172"
        stroke="#c9a84c" stroke-width="2.8" fill="none" stroke-linejoin="round"/>

  <!-- Convergence spark at top -->
  <path d="M100 20 L101.5 26 L107 28 L101.5 30 L100 36 L98.5 30 L93 28 L98.5 26 Z"
        fill="#c9a84c" opacity="0.65"/>

  <!-- Subtle bottom gap spark -->
  <circle cx="100" cy="174" r="1.8" fill="#c9a84c" opacity="0.3"/>

  <!-- Inner organic detail — faint vein -->
  <path d="M68 82 C64 92, 63 110, 68 122"
        stroke="#fafafa" stroke-width="0.8" fill="none" opacity="0.2" stroke-linecap="round"/>

  <!-- Inner geometric detail — circuit nodes -->
  <line x1="132" y1="82" x2="134" y2="96" stroke="#c9a84c" stroke-width="0.8" opacity="0.2"/>
  <line x1="134" y1="96" x2="132" y2="110" stroke="#c9a84c" stroke-width="0.8" opacity="0.2"/>
  <circle cx="134" cy="96" r="1.5" fill="#c9a84c" opacity="0.15"/>
  <circle cx="132" cy="110" r="1.5" fill="#c9a84c" opacity="0.15"/>
</svg>
