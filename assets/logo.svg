<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Split figure: left = human with machine augmentation, right = machine with human softening -->

  <!-- LEFT: Human base with machine parts (有了机器样的人) -->
  <!-- Organic head + face outline -->
  <path d="M100 28
           C82 28, 60 42, 55 62
           C50 82, 54 98, 58 112
           C60 120, 56 136, 54 150
           L52 165
           C50 170, 48 174, 44 178
           L100 178"
        stroke="#fafafa" stroke-width="2.4" fill="none" stroke-linecap="round"/>

  <!-- Human eye — organic almond shape -->
  <path d="M70 76 C74 70, 86 70, 90 76 C86 82, 74 82, 70 76 Z"
        stroke="#fafafa" stroke-width="1.3" fill="none" opacity="0.7"/>
  <circle cx="80" cy="76" r="2" fill="#fafafa" opacity="0.5"/>

  <!-- Machine augmentations visible on human side -->
  <line x1="62" y1="100" x2="50" y2="96" stroke="#c9a84c" stroke-width="1" opacity="0.35"/>
  <line x1="62" y1="108" x2="48" y2="110" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
  <circle cx="50" cy="96" r="2" fill="#c9a84c" opacity="0.25"/>
  <circle cx="48" cy="110" r="1.5" fill="#c9a84c" opacity="0.2"/>
  <!-- Angular jaw augmentation -->
  <path d="M72 130 L66 140 L60 148" stroke="#c9a84c" stroke-width="1" fill="none" opacity="0.25" stroke-linejoin="round"/>

  <!-- RIGHT: Machine base with human softening (有了人样的机器) -->
  <!-- Angular head + face outline -->
  <path d="M100 28
           L130 40
           L146 58
           L150 78
           L147 98
           L152 112
           L148 136
           L150 150
           L152 165
           C154 170, 156 174, 158 178
           L100 178"
        stroke="#c9a84c" stroke-width="2.4" fill="none" stroke-linejoin="round"/>

  <!-- Machine eye — geometric diamond with soft organic pupil -->
  <path d="M118 72 L126 66 L134 72 L126 78 Z"
        stroke="#c9a84c" stroke-width="1.3" fill="none" opacity="0.7"/>
  <circle cx="126" cy="72" r="2" fill="#fafafa" opacity="0.4"/>

  <!-- Human softening on machine side -->
  <path d="M144 96 C148 104, 150 114, 146 122"
        stroke="#fafafa" stroke-width="1" fill="none" opacity="0.25" stroke-linecap="round"/>
  <path d="M142 136 C146 142, 148 150, 145 156"
        stroke="#fafafa" stroke-width="0.8" fill="none" opacity="0.18" stroke-linecap="round"/>

  <!-- Fusion spark at forehead -->
  <path d="M100 46 L101.5 51 L106 53 L101.5 55 L100 60 L98.5 55 L94 53 L98.5 51 Z"
        fill="#c9a84c" opacity="0.5"/>

  <!-- Subtle center divide -->
  <line x1="100" y1="32" x2="100" y2="175" stroke="#c9a84c" stroke-width="0.4" opacity="0.1" stroke-dasharray="2 4"/>
</svg>
