<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <!-- Outer diamond (rotated square) — represents the crystal lattice of SiC -->
  <rect x="120" y="16" width="148" height="148" rx="18" transform="rotate(45 120 120)" stroke="#c9a84c" stroke-width="3" fill="none"/>

  <!-- Inner diamond — smaller, offset, creating depth -->
  <rect x="120" y="48" width="102" height="102" rx="12" transform="rotate(45 120 120)" stroke="#c9a84c" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Spark element — a 4-point star at center-top, representing the ignition point -->
  <path d="M120 58 L123 68 L133 71 L123 74 L120 84 L117 74 L107 71 L117 68 Z" fill="#c9a84c" opacity="0.7"/>

  <!-- Si text — silicon, left side -->
  <text x="88" y="130" font-family="'Space Grotesk', system-ui, sans-serif" font-size="32" font-weight="700" fill="#fafafa" letter-spacing="-1">Si</text>

  <!-- C text — carbon, right side -->
  <text x="140" y="130" font-family="'Space Grotesk', system-ui, sans-serif" font-size="32" font-weight="700" fill="#c9a84c" letter-spacing="-1">C</text>

  <!-- Bond line between Si and C — the covalent bond -->
  <line x1="126" y1="122" x2="138" y2="122" stroke="#c9a84c" stroke-width="2" opacity="0.5"/>

  <!-- SPARK text below -->
  <text x="120" y="160" font-family="'Space Grotesk', system-ui, sans-serif" font-size="14" font-weight="500" fill="#fafafa" text-anchor="middle" letter-spacing="6" opacity="0.6">SPARK</text>
</svg>
